# Sortie ask_human resume bridge (LAYER 2 — two-way, inbound direction).
#
# WHY THIS EXISTS: Sortie has no native way for the agent to ASK the human a question
# mid-task and resume with the answer. The agent side (see WORKFLOW.md prompt body) parks
# the issue in sortie:awaiting-human and posts its question as a `### ❓ ask_human` comment.
# This workflow is the INBOUND half: when the human replies, it re-queues the issue so
# Sortie re-dispatches; before_run reuses the existing sortie/<id> branch (prior work
# intact) and the prompt tells the agent to read the issue thread for the answer.
#
# GITHUB-FIRST: the human answers by commenting directly on the issue. A later Discord
# phase only adds an INPUT ADAPTER (a Discord bot that posts the human's Discord reply as a
# GitHub comment) — it triggers this exact same workflow, so detection stays unified here.
#
# AUTHORIZATION / LOOP SAFETY: a re-queue fires only on an issue currently in
# sortie:awaiting-human, and only from a TRUSTED reply that is not the agent's own question:
#   - the repo OWNER (scolacur) commenting directly on GitHub, OR
#   - a COLLABORATOR (the dashboard/Discord bot forwarding a human's reply) whose comment
#     carries the marker `<!-- sortie:human-reply -->`.
# We gate on author_association rather than a hardcoded login, so this works whichever
# account GITHUB_WRITE_TOKEN posts as (D-040 Notification Center: the inline-reply endpoint
# posts the forwarded reply WITH that marker). The agent's own `### ❓ ask_human` question is
# excluded by the startsWith check; the github-actions confirmation below is neither OWNER nor
# COLLABORATOR and carries no marker — so neither can loop. A stranger's comment on the public
# repo is author_association NONE, so it can't trigger a re-queue even if it copies the marker.

name: sortie-ask-human

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write        # only to swap awaiting-human -> queued + confirm

# Don't let two fast replies on the same issue double-flip.
concurrency:
  group: sortie-ask-human-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  resume:
    # Fire only on an awaiting-human issue, for a trusted reply that is NOT the agent's own
    # ask_human question. issue.labels + comment.author_association are on the issue_comment
    # payload, so this gates cheaply with no API call. OWNER = scolacur replying directly;
    # COLLABORATOR + marker = a dashboard/Discord-forwarded human reply.
    if: >-
      contains(github.event.issue.labels.*.name, 'sortie:awaiting-human') &&
      !startsWith(github.event.comment.body, '### ❓ ask_human') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        (github.event.comment.author_association == 'COLLABORATOR' &&
          contains(github.event.comment.body, '<!-- sortie:human-reply -->'))
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      ISSUE: ${{ github.event.issue.number }}
    steps:
      - name: Re-queue so Sortie resumes with the human's answer
        run: |
          set -euo pipefail
          echo "Human reply on awaiting-human issue #$ISSUE — re-queuing."
          gh issue edit "$ISSUE" --repo "$REPO" \
            --remove-label "sortie:awaiting-human" \
            --add-label "sortie:queued"
          gh issue comment "$ISSUE" --repo "$REPO" --body \
            "Sortie: got your reply — re-queued (\`sortie:queued\`). The agent resumes on branch \`sortie/$ISSUE\` and will read this thread for your answer."
