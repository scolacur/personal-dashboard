# Sortie PR-review/comment → re-work bridge (BEHAVIOR 3 — replaces the flaky NATIVE reaction).
#
# WHY THIS EXISTS: Sortie's native `reactions.review_comments` only arms its watch-set at
# the process-startup "pending reaction recovery" pass (one per container restart). An issue
# that hands off to `sortie:in-review` BETWEEN restarts is never watched, so a human review or
# comment on its PR is invisible until the next restart — which is why PD-256's feedback was
# silently dropped (issue #132 handed off 12m after the last restart; its "Request changes"
# review 17h later did nothing). Rather than depend on that fragile, restart-coupled poller,
# this in-repo bridge does what sortie-conflict-rework.yml does for conflicts: on a trusted
# human review/comment it flips the issue back into the active label set, so Sortie
# re-dispatches a NORMAL run. before_run reuses the existing sortie/<id> branch and the
# WORKFLOW.md prompt's "check for an open PR" step (Step 2B) reads the review feedback off the
# PR via `gh api` — so the agent addresses it regardless of how the run was triggered.
#
# BROADENS TRIGGERS (the second half of PD-256): the native reaction only fired on a
# CHANGES_REQUESTED *review*. This bridge also reacts to a "Comment" review, inline review
# comments, and top-level PR conversation comments — the ways Steve actually leaves feedback.
# A pure APPROVED review with no body is intentionally NOT a trigger (approval = ready to
# merge, not re-work).
#
# AUTHORIZATION / LOOP SAFETY (mirrors sortie-conflict-rework + sortie-ask-human):
#   - Only re-activates an issue currently in `sortie:in-review`, whose PR head is `sortie/*`
#     (a PR Sortie itself opened). A stranger can't push to main, can't open a sortie/* head
#     branch, and this workflow reads no attacker-controlled content into a privileged step.
#   - Only a TRUSTED reply re-activates: the repo OWNER (scolacur) directly, OR a COLLABORATOR
#     (dashboard/Discord bot forwarding a human reply) carrying the `<!-- sortie:human-reply -->`
#     marker. The sortie bot (COLLABORATOR, no marker) and this workflow's own github-actions
#     confirmation comment are therefore excluded — neither can loop.
#   - Bounded: flipping in-review -> queued moves the issue OUT of in-review, so a duplicate
#     event is a no-op until Sortie hands back to in-review. Per-issue agent.max_sessions (3)
#     and max_tokens remain the hard ceiling on re-work cycles.
#
# NOTE: we flip to `sortie:queued`, not `:in-progress`. `queued` is the mechanically-correct
# "re-activate" state — it is in query_filter/active_states so the reconciler dispatches it,
# and the agent itself flips to `:in-progress` when it picks the issue up (in_progress_state).
# Setting in-progress directly would look "already claimed" and may not dispatch. Same choice
# as sortie-conflict-rework.yml.

name: sortie-review-rework

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write        # only to swap the state label on Sortie's own issues

# One re-activation at a time per PR; don't let two fast comments double-flip.
concurrency:
  group: sortie-review-rework-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  reactivate:
    # Cheap gate on the webhook payload (no API call): a trusted human, not an approval-only
    # review, and — for issue_comment — actually a PR comment. Deeper checks (head is sortie/*,
    # issue is in-review) run in the script below where an API call is justified.
    if: >-
      (
        github.event_name == 'pull_request_review' &&
        (github.event.review.state == 'changes_requested' ||
          github.event.review.state == 'commented') &&
        (
          github.event.review.author_association == 'OWNER' ||
          (github.event.review.author_association == 'COLLABORATOR' &&
            contains(github.event.review.body, '<!-- sortie:human-reply -->'))
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          github.event.comment.author_association == 'OWNER' ||
          (github.event.comment.author_association == 'COLLABORATOR' &&
            contains(github.event.comment.body, '<!-- sortie:human-reply -->'))
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        !startsWith(github.event.comment.body, '### ❓ ask_human') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          (github.event.comment.author_association == 'COLLABORATOR' &&
            contains(github.event.comment.body, '<!-- sortie:human-reply -->'))
        )
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Re-activate the Sortie issue whose in-review PR got human feedback
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"

          # 1) Resolve the PR number for this event.
          if [ "$EVENT" = "issue_comment" ]; then
            PR="${{ github.event.issue.number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi

          # 2) Resolve the PR head branch. review/review_comment payloads carry it inline;
          #    issue_comment does not, so look it up. One API call, on our own PR only.
          if [ "$EVENT" = "issue_comment" ]; then
            HEAD="$(gh pr view "$PR" --repo "$REPO" --json headRefName --jq .headRefName)"
          else
            HEAD="${{ github.event.pull_request.head.ref }}"
          fi

          case "$HEAD" in
            sortie/*) : ;;
            *) echo "PR #$PR head=$HEAD is not a sortie/* branch — ignore."; exit 0 ;;
          esac
          ISSUE="${HEAD#sortie/}"   # head is sortie/<issue-number>

          # 3) Only re-activate from sortie:in-review (the handoff state). Skip if the issue is
          #    already active (queued/in-progress), escalated (needs-human), parked
          #    (awaiting-human), or terminal — prevents a re-trigger loop and respects an
          #    intentional park.
          LABELS="$(gh issue view "$ISSUE" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")"

          case ",$LABELS," in
            *",sortie:in-review,"*)
              echo "PR #$PR (issue #$ISSUE) got human feedback and is in-review -> re-activating."
              # Single-label invariant: strip any stale in-progress first, tolerantly (a
              # --remove-label on an absent label 422s under set -e). in-review is present
              # (we matched it) -> remove + queue.
              gh issue edit "$ISSUE" --repo "$REPO" \
                --remove-label "sortie:in-progress" 2>/dev/null || true
              gh issue edit "$ISSUE" --repo "$REPO" \
                --remove-label "sortie:in-review" \
                --add-label "sortie:queued"
              gh issue comment "$ISSUE" --repo "$REPO" --body \
                "Sortie: got your review feedback on PR #$PR — re-activated (\`sortie:queued\`). The agent resumes on branch \`sortie/$ISSUE\`, reads the PR review comments, and pushes fixes to the existing PR."
              ;;
            *)
              echo "PR #$PR (issue #$ISSUE) feedback, but issue labels=[$LABELS] (not in-review) — skip."
              ;;
          esac
