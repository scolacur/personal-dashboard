# Sortie stuck-issue watchdog (LAYER 1 — escalation) + label-rescue (P1 hand-off backstop).
#
# This file runs TWO independent jobs on the same schedule:
#   • detect-stuck   — escalates issues stalled in an active state to sortie:stuck (below).
#   • rescue-labels  — backstops the P1 hand-off race: when Sortie cancels the worker
#     context on a needs-human-review exit, BOTH the after_run hook AND the handoff label
#     transition can die (`context canceled`), leaving a real, open sortie/* PR whose issue
#     has NO sortie:* state label — invisible to review automation. The agent now sets
#     sortie:in-review itself in-turn (WORKFLOW.md "Finish"); this job is the belt to its
#     suspenders, catching any label-less issue that still has an open sortie/* PR.
#
# WHY THIS EXISTS: Sortie has several failure modes that leave an issue SILENTLY
# PARKED in an active state with no human signal — it just stops, invisibly:
#   1. Workspace-prep failure (e.g. the exit-128 clone loop) — agent never starts.
#   2. agent.max_sessions exhaustion — Sortie stops dispatching, no transition, no ping.
#   3. Container-restart orphan — the in-memory worker dies on restart but the issue
#      stays labelled sortie:in-progress (NOT in the dispatch/queued set), so nothing
#      ever re-picks it.
#   4. Sortie down / not dispatching — issues sit in sortie:queued forever.
# None of these reach the native `after_run` hook or the `reactions` escalation (those
# only fire for review-feedback on an existing PR), so a hook-based fix can't catch them.
# This watchdog is STATE-BASED and EXTERNAL: it watches label age, not run outcomes, so
# it catches all four modes. It is the sibling of sortie-conflict-rework.yml (BEHAVIOR 2).
#
# WHAT IT DOES: an issue that has sat in sortie:in-progress (or sortie:queued) longer than
# the threshold (in-progress 120m, queued 30m) is flipped to the terminal-ish sortie:stuck
# label and an @-mention comment is posted. A healthy run completes in minutes and moves the
# label well before the threshold, so a breach means genuinely stalled. sortie:stuck is NOT
# in query_filter, so the issue drops out of Sortie's candidate set until a human re-queues
# it (sortie:queued) or drops it (sortie:wontfix).
#
# CONCURRENCY-AWARE QUEUED SWEEP (PD-296): a queued issue is only a problem if Sortie COULD
# have dispatched it but didn't. When the in-progress count is already at max_concurrent_agents
# (read from ops/sortie/WORKFLOW.md), every worker slot is busy and a long queue is EXPECTED,
# not stuck — so the queued sweep is skipped entirely for that run. Queued-stuck therefore
# fires only when a slot is free and work still sits queued (mode 4: Sortie down / not
# dispatching). The in-progress sweep is unconditional (a busy slot can still be a stalled one).
#
# DELIBERATELY NOT TOUCHED: sortie:awaiting-human (Layer 2 ask_human — an INTENTIONAL,
# expected park waiting on a human; escalating it to stuck would be wrong), and the terminal
# states sortie:in-review / sortie:done / sortie:wontfix.
#
# AUTHORIZATION MODEL (same as conflict-rework): runs with the repo-scoped GITHUB_TOKEN and
# only ever relabels issues already in a Sortie-controlled active state. It reads no
# attacker-controlled content; a stranger cannot put an issue into sortie:in-progress (only
# a write+ actor / Sortie itself can apply labels).

name: sortie-watchdog

on:
  schedule:
    # Every 30 min. The queued threshold is 30m, so the run cadence matches it: effective
    # detection latency is (threshold + up to one interval). Cadence was relaxed from 15m
    # once the queued sweep became concurrency-aware (PD-296) — queued-stuck now fires only
    # on genuine non-dispatch (a free slot with work waiting), a rare failure mode that does
    # not need minute-level detection. NOTE: GitHub cron is best-effort and can be delayed
    # several minutes under load.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      threshold_minutes:
        description: 'Override BOTH per-state thresholds for this run (blank = use defaults: queued 30m, in-progress 120m). Handy with dry_run.'
        required: false
        default: ''
      dry_run:
        description: 'true = report only, make no label/comment changes.'
        required: false
        default: 'false'

# Single-flight: never let two runs double-flip a label.
concurrency:
  group: sortie-watchdog
  cancel-in-progress: false

permissions:
  contents: read
  issues: write        # swap the state label + comment on Sortie's own issues
  pull-requests: read  # rescue-labels reads open sortie/* PRs

jobs:
  detect-stuck:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      MENTION: scolacur          # who to @-mention (also forwarded to Discord via webhook)
      THRESHOLD_IN_PROGRESS_MIN: '120'   # a stalled active run (prep-fail / exhaustion / restart-orphan)
      THRESHOLD_QUEUED_MIN: '30'         # not picked up promptly WHILE a slot is free -> Sortie may be down
    steps:
      # Checkout is only for reading ops/sortie/WORKFLOW.md (the max_concurrent_agents source
      # of truth) — the sweep itself talks to GitHub via `gh`, not the working tree.
      - uses: actions/checkout@v4

      - name: Escalate stale in-progress / queued issues to sortie:stuck
        run: |
          set -euo pipefail

          # ── Concurrency limit (single source of truth: ops/sortie/WORKFLOW.md, PD-296) ──
          # Parse `max_concurrent_agents: N` out of the YAML front-matter. Fall back to 1
          # (the pilot value) if the line ever moves/renames, so the gate fails SAFE-CLOSED:
          # a limit of 1 is the most permissive gate (queued rarely swept), never a false
          # "stuck" storm. Log whichever we used so a drift is visible in the run output.
          # `|| true` so a no-match (grep exit 1) under `set -e`/`pipefail` doesn't abort the
          # script before the fallback below runs.
          CONCURRENCY_LIMIT="$(
            { grep -oE '^[[:space:]]*max_concurrent_agents:[[:space:]]*[0-9]+' ops/sortie/WORKFLOW.md \
              | grep -oE '[0-9]+$' | head -n1; } || true
          )"
          if [ -z "${CONCURRENCY_LIMIT:-}" ]; then
            echo "watchdog: WARN could not parse max_concurrent_agents from WORKFLOW.md — defaulting to 1"
            CONCURRENCY_LIMIT=1
          fi

          # In-progress slots in use RIGHT NOW — snapshotted BEFORE the loop, because the
          # in-progress sweep below may relabel stalled issues to sortie:stuck (freeing their
          # slot). The queued gate must reflect the state the operator sees at run start, not
          # a slot this same run just vacated.
          IN_PROGRESS_COUNT="$(
            gh issue list --repo "$REPO" --state open --label "sortie:in-progress" \
              --json number --jq 'length'
          )"
          echo "watchdog: concurrency_limit=${CONCURRENCY_LIMIT} in_progress_now=${IN_PROGRESS_COUNT}"

          OVERRIDE="${{ github.event.inputs.threshold_minutes }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          [ -z "$DRY_RUN" ] && DRY_RUN="false"

          NOW="$(date -u +%s)"
          echo "watchdog: thresholds in-progress=${THRESHOLD_IN_PROGRESS_MIN}m queued=${THRESHOLD_QUEUED_MIN}m override='${OVERRIDE}' dry_run=${DRY_RUN}"

          # Two active states get a staleness clock with its OWN threshold. The clock starts
          # at the most recent time the issue ENTERED that state — `last` over its
          # `labeled <state>` timeline events. So if a ticket bounces (in-progress ->
          # awaiting-human -> in-progress), the timer RESTARTS from the latest re-entry; an
          # earlier 90-min stint doesn't count once it leaves and comes back.
          for STATE in in-progress queued; do
            LABEL="sortie:${STATE}"

            # Per-state threshold (a manual dispatch override, if given, wins for both).
            if [ -n "$OVERRIDE" ]; then
              THRESHOLD_MIN="$OVERRIDE"
            elif [ "$STATE" = "in-progress" ]; then
              THRESHOLD_MIN="$THRESHOLD_IN_PROGRESS_MIN"
            else
              THRESHOLD_MIN="$THRESHOLD_QUEUED_MIN"
            fi

            # Concurrency gate (PD-296): a queued issue is only "stuck" if a worker slot was
            # free and Sortie still failed to dispatch it. When in-progress is at/over the
            # limit, every slot is busy and the queue is legitimately waiting its turn — skip
            # the whole queued sweep for this run. The in-progress sweep is never gated.
            if [ "$STATE" = "queued" ] && [ "$IN_PROGRESS_COUNT" -ge "$CONCURRENCY_LIMIT" ]; then
              echo "queued sweep skipped: in_progress=${IN_PROGRESS_COUNT} >= limit=${CONCURRENCY_LIMIT} (all slots busy; queue is expected, not stuck)"
              continue
            fi

            mapfile -t NUMS < <(
              gh issue list --repo "$REPO" --state open --label "$LABEL" \
                --json number --jq '.[].number'
            )
            [ "${#NUMS[@]}" -eq 0 ] && { echo "no open issues in $LABEL"; continue; }

            for N in "${NUMS[@]}"; do
              ENTERED="$(
                gh api "repos/$REPO/issues/$N/timeline" --paginate \
                  --jq "[.[] | select(.event==\"labeled\" and .label.name==\"$LABEL\") | .created_at] | last // empty"
              )"
              if [ -z "$ENTERED" ]; then
                echo "#$N ($LABEL): no labeled event found — skip"
                continue
              fi

              ENTERED_SEC="$(date -u -d "$ENTERED" +%s)"
              AGE_MIN=$(( (NOW - ENTERED_SEC) / 60 ))

              if [ "$AGE_MIN" -lt "$THRESHOLD_MIN" ]; then
                echo "#$N ($LABEL) age ${AGE_MIN}m < ${THRESHOLD_MIN}m — ok"
                continue
              fi

              if [ "$STATE" = "in-progress" ]; then
                REASON="has been in \`$LABEL\` for **${AGE_MIN} min** with no resolution. A healthy run finishes in minutes and moves the label; this one is stalled (workspace-prep failure, max_sessions exhaustion, or a container-restart orphan)."
              else
                REASON="has been in \`$LABEL\` for **${AGE_MIN} min** without being picked up **while a worker slot was free** (in-progress ${IN_PROGRESS_COUNT} < limit ${CONCURRENCY_LIMIT}) — so this is not a full-queue wait. Sortie may not be dispatching — check the \`sortie\` container is up and healthy."
              fi

              echo "#$N ($LABEL) age ${AGE_MIN}m >= ${THRESHOLD_MIN}m — STUCK"
              if [ "$DRY_RUN" = "true" ]; then
                echo "  dry_run: would flip #$N $LABEL -> sortie:stuck + @-mention"
                continue
              fi

              # Clear the stale active label first (tolerant), then add sortie:stuck.
              gh issue edit "$N" --repo "$REPO" --remove-label "$LABEL" 2>/dev/null || true
              gh issue edit "$N" --repo "$REPO" --add-label "sortie:stuck"

              BODY="$(printf '@%s ⚠️ **Sortie watchdog**: issue #%s %s\n\nMoved to `sortie:stuck` (dropped from Sortie'\''s candidate set). Re-label `sortie:queued` to retry, or `sortie:wontfix` to drop it. _(threshold: %s min)_\n\n-Sortie Watchdog' \
                "$MENTION" "$N" "$REASON" "$THRESHOLD_MIN")"
              gh issue comment "$N" --repo "$REPO" --body "$BODY"
            done
          done

  # ── LABEL-RESCUE: a real open sortie/* PR whose issue lost its state label ──────────
  # P1 hand-off backstop. The agent self-relabels to sortie:in-review in-turn, but if both
  # that and Sortie's handoff transition lost the race (context canceled) the issue can land
  # with NO sortie:* state label while its PR is open and waiting — invisible to the review
  # reactions AND to detect-stuck (which only watches in-progress/queued). This puts it back
  # into sortie:in-review so the review loop and a human can see it. Idempotent: an issue
  # that already carries ANY sortie:* label is left untouched (queued re-runs, in-progress is
  # detect-stuck's job, awaiting-human is intentional, in-review is already correct).
  rescue-labels:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Set sortie:in-review on label-less issues that have an open sortie/* PR
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          [ -z "$DRY_RUN" ] && DRY_RUN="false"

          # Open PRs whose head branch is sortie/<issue> — only Sortie/the bot creates these.
          gh pr list --repo "$REPO" --state open --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sortie/")) | .headRefName' \
          | while read -r BRANCH; do
              [ -z "$BRANCH" ] && continue
              N="${BRANCH#sortie/}"
              # Only act on a real issue number.
              case "$N" in (*[!0-9]*|'') echo "skip non-numeric branch $BRANCH"; continue;; esac

              # Does the issue already carry any sortie:* state label?
              HAS_STATE="$(gh issue view "$N" --repo "$REPO" --json labels \
                --jq '[.labels[].name | select(startswith("sortie:"))] | length' 2>/dev/null || echo "ERR")"
              if [ "$HAS_STATE" = "ERR" ]; then
                echo "#$N: could not read labels (closed/missing?) — skip"; continue
              fi
              if [ "$HAS_STATE" != "0" ]; then
                echo "#$N already has a sortie:* label — leave it"; continue
              fi

              echo "#$N has open PR $BRANCH but NO sortie:* label — rescue to sortie:in-review"
              if [ "$DRY_RUN" = "true" ]; then
                echo "  dry_run: would add sortie:in-review to #$N"; continue
              fi
              gh issue edit "$N" --repo "$REPO" --add-label "sortie:in-review"
              gh issue comment "$N" --repo "$REPO" --body "$(printf '🔁 **Sortie label-rescue**: this issue had an open PR (\`%s\`) but no `sortie:*` state label — the hand-off transition was lost to a canceled worker context. Restored to `sortie:in-review`.\n\n-Sortie Watchdog' "$BRANCH")"
            done
