# Egress allowlist proxy for the agent-worker container.
#
# Domain-level allowlist via the CONNECT target host (no TLS interception, so no CA
# needed). HTTPS to the listed domains is permitted; everything else is denied. This is
# the control that contains token exfiltration: even if the agent reads its GitHub token /
# CLAUDE_CODE_OAUTH_TOKEN from its env, it cannot POST them to a non-allowlisted host.
#
# Tune the allowlist from real denials:
#   docker exec agent-worker-proxy grep TCP_DENIED /var/log/squid/access.log
# (add the denied host below if it's legitimately needed, e.g. an npm CDN).

http_port 3128

acl SSL_ports port 443
acl CONNECT method CONNECT

# --- ALLOWLIST (leading dot = domain + all subdomains) ---
acl allowed dstdomain .anthropic.com          # Claude Code API + telemetry
acl allowed dstdomain .github.com             # git, gh, api.github.com, codeload
acl allowed dstdomain .githubusercontent.com  # raw/objects (release assets, native prebuilds)
acl allowed dstdomain .npmjs.org              # registry.npmjs.org + npm CDN (npm ci)
acl allowed dstdomain .datadoghq.com          # telemetry (Steve's call to allow; not required for the work)

# Deny CONNECT to anything other than 443.
http_access deny CONNECT !SSL_ports
# Allow only allowlisted destinations.
http_access allow allowed
# Default deny.
http_access deny all

# Lean: no caching. Access log to a file (squid can't write /dev/stdout after it drops
# privileges to the 'proxy' user). Operational/startup errors still go to docker logs.
# View allow/deny:  docker exec agent-worker-proxy tail -f /var/log/squid/access.log
cache deny all
access_log stdio:/var/log/squid/access.log
