# Container Manager Project (docker-compose) for the Sortie autonomous loop.
# GUI alternative to the `docker build` / `docker run` in README Step 4 — same
# build, env, volumes, and port, but managed from the Container Manager UI.
#
# Prereqs (README Steps 1–3 + 4.1–4.3): bot + branch protection + labels done;
# the repo cloned and `sortie.env` + `data/` + `workspaces/` created in the base dir;
# `data/` and `workspaces/` chown'd to uid 1000.
#
# Paths are ABSOLUTE and NAS-specific (base dir = /volume1/docker/personal-dashboard).
# If you move the base dir, find-replace it here.
#
# Container Manager → Project → Create → "Set path" to the folder holding this file
# (or paste these contents) → it builds the image and starts the container.

services:
  sortie:
    build:
      context: /volume1/docker/personal-dashboard/personal-dashboard
      dockerfile: ops/sortie/Dockerfile
    image: sortie-dashboard
    container_name: sortie
    restart: unless-stopped
    env_file:
      - /volume1/docker/personal-dashboard/sortie.env
    volumes:
      - /volume1/docker/personal-dashboard/data:/home/sortie
      - /volume1/docker/personal-dashboard/workspaces:/home/sortie/workspaces
      - /volume1/docker/personal-dashboard/personal-dashboard/ops/sortie/WORKFLOW.md:/home/sortie/WORKFLOW.md:ro
    ports:
      - "7678:7678"
